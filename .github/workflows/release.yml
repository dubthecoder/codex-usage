name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Build .app
        run: ./scripts/build-app.sh

      - name: Ad-hoc codesign
        run: |
          codesign --sign - --deep --force --timestamp=none \
            "build/Codex Usage Watcher.app"
          codesign --verify --verbose "build/Codex Usage Watcher.app"

      - name: Resolve version
        id: vars
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          # Allow only safe version chars; reject anything else.
          case "$version" in
            *[!A-Za-z0-9._-]*)
              echo "Refusing unsafe version string: $version" >&2
              exit 1
              ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package zip
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Codex Usage Watcher.app" \
            "dist/Codex-Usage-Watcher-${VERSION}.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download `Codex-Usage-Watcher-${{ steps.vars.outputs.version }}.zip` from the assets below.
            2. Unzip it and drag **Codex Usage Watcher.app** into `/Applications`.
            3. First launch: **right-click the app → Open → Open** to bypass the unidentified-developer warning. This build is ad-hoc signed, not notarized, so macOS will warn once and then remember your choice.

            If macOS refuses to launch it (e.g. "app is damaged and can't be opened"), strip the quarantine flag:

            ```bash
            xattr -dr com.apple.quarantine "/Applications/Codex Usage Watcher.app"
            ```

            Then double-click as normal.
