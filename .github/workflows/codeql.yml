name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            runner: macos-14
            build-mode: manual
          - language: actions
            runner: ubuntu-latest
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Swift sources (minimal, no icon)
        if: matrix.build-mode == 'manual'
        run: |
          swiftc \
            -target arm64-apple-macosx14.0 \
            -framework AppKit \
            -framework SwiftUI \
            Sources/CodexUsageWatcher/main.swift \
            -o /tmp/codeql-build-output

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
